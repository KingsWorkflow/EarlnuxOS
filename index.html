<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarlnuxOS | Browser Demo</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #00ffcc;
            --terminal-bg: #000;
        }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--accent-color);
            letter-spacing: 2px;
            margin: 0;
        }
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        #screen_container {
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.1);
            background: var(--terminal-bg);
            padding: 10px;
            border-radius: 8px;
            position: relative;
        }
        canvas {
            display: block;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        button:hover {
            background: var(--accent-color);
            color: #000;
        }
        .status {
            margin-top: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EARLNUX OS</h1>
        <div class="subtitle">v1.0.0 "Prism" | Online Browser Experience</div>
    </div>

    <div id="screen_container">
        <!-- v86 will render the VGA screen here -->
        <div style="white-space: pre; font-family: Courier, monospace; line-height: 14px"></div>
        <canvas style="display: none"></canvas>
    </div>

    <div class="controls">
        <button onclick="window.location.reload()">Reset System</button>
        <button onclick="window.open('https://github.com/BSIT-338/project-OS', '_blank')">View Source</button>
    </div>

    <div class="status" id="status">Status: Waiting for initialization...</div>

    <!-- v86 Emulator Library - Using UNPKG mirror for maximum reliability -->
    <script src="https://unpkg.com/v86/build/libv86.js"></script>
    <script>
        window.onload = function() {
            var status = document.getElementById("status");
            console.log("Checking for v86 engine...");
            
            if (typeof V86Starter !== "function") {
                status.innerText = "Critical Error: Emulator engine (libv86.js) failed to load. Are you offline or is a script blocker active?";
                console.error("V86Starter is not defined. Check your internet connection or CDN availability.");
                return;
            }

            status.innerText = "Status: Connecting to Emulator Engine...";

            var settings = {
                wasm_path: "https://unpkg.com/v86/build/v86.wasm",
                memory_size: 128 * 1024 * 1024,
                vga_memory_size: 8 * 1024 * 1024,
                screen_container: document.getElementById("screen_container"),
                bios: { url: "https://unpkg.com/v86/bios/seabios.bin" },
                vga_bios: { url: "https://unpkg.com/v86/bios/vgabios.bin" },
                cdrom: { url: "build/os.iso" },
                autostart: true,
            };

            try {
                var emulator = new V86Starter(settings);
                
                emulator.add_listener("emulator-ready", function() {
                    status.innerText = "Status: Hardware Ready. Booting EarlnuxOS...";
                    console.log("v86 Ready.");
                });

                emulator.add_listener("download-progress", function(e) {
                    status.innerText = "Status: Downloading " + e.file_name + " (" + Math.round(e.loaded/e.total*100) + "%)";
                });

                emulator.add_listener("download-error", function(e) {
                    status.innerText = "Error: Failed to load " + e.file_name + ". Check your local server!";
                    console.error("Download error:", e);
                });

            } catch (e) {
                status.innerText = "Critical Error: " + e.message;
                console.error("V86 Start Error:", e);
            }
        };
    </script>
</body>
</html>
